# Publish ONLY the Next static export. Legacy HTML at repo root lives in legacy-static/
# and is not deployed when publish points here.
#
# In Netlify: Site settings → Build & deploy → Build settings should NOT override
# "Publish directory" to "/" or empty — use netlify.toml or set Publish directory to: nextjs/out
[build]
  command = "cd nextjs && npm install && npm run build"
  publish = "nextjs/out"

[build.environment]
  NODE_VERSION = "20"
